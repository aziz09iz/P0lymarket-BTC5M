[feeds]
binance_ws = "wss://stream.binance.com:443/ws/btcusdt@trade"
polymarket_rest = "https://gamma-api.polymarket.com"
polymarket_ws = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
market_filter_min_secs = 300
market_filter_max_secs = 604800
market_keyword_filter = "BTC"

[state]
btc_tick_window_secs = 60
btc_max_ticks = 500

[redis]
url = "redis://127.0.0.1:6379"
publish_enabled = true

[logging]
level = "info"   # debug | info | warn
format = "pretty" # pretty | json

[probability]
max_momentum_adjustment = 0.15
momentum_weight = 0.6
delta_weight = 0.4

[edge]
min_edge_pct = 0.08
min_confidence = 0.45
max_spread_for_trade = 0.06
min_time_remaining_secs = 300
max_time_remaining_secs = 604800
edge_broadcast_interval_secs = 30

[strategy]
# Log all edges without trading — use for threshold calibration
observation_mode = false
relaxed_mode_after_mins = 8
relaxed_min_edge_pct = 0.020
relaxed_min_confidence = 0.35
relaxed_min_velocity_abs = 0.05
floor_mode_after_mins = 18
floor_min_edge_pct = 0.012
floor_min_confidence = 0.28
floor_entry_if_any_signal = true
session_definition_mins = 30

[strategy.divergence]
enabled = true
market_uncertainty_min = 0.32
market_uncertainty_max = 0.68
min_velocity_abs = 0.10
min_velocity_consistency = 0.55
velocity_scale = 1.2
delta_scale = 40000
min_edge_pct = 0.035
min_confidence = 0.42
max_expected_repricing = 0.20
profit_target_pct = 0.10
stop_loss_pct = 0.06
exit_before_final_secs = 35
max_spread = 0.08
require_volume_alignment = true
min_time_remaining_secs = 50
max_time_remaining_secs = 280

[risk]
max_concurrent_positions = 1
max_exposure_usd = 10.0
consecutive_loss_limit = 3
cooldown_after_loss_secs = 120
min_trade_interval_secs = 15

[paper]
enabled = true
default_size_usd = 1.0
flag_suspicious_trades = true
suspicious_pnl_threshold_pct = 50.0
suspicious_hold_max_secs = 30

[data_quality]
max_price_jump_pct_per_5s = 0.12
max_price_age_ms = 2000          # live WS feed (VPS production)
max_price_age_fallback_ms = 8000 # REST fallback at 2s interval (local dev)
ws_min_tick_rate = 0.2
ws_silence_reconnect_secs = 15
ws_ping_interval_secs = 20

[btc5m]
gamma_api = "https://gamma-api.polymarket.com"
clob_api = "https://clob.polymarket.com"
clock_sync_interval_secs = 60
final_window_secs = 30          # stop trading when <= 30s remain
pre_fetch_next_secs = 60        # pre-fetch next market when <= 60s remain
price_stale_threshold_ms = 3000 # suppress trading if price older than this
market_retry_attempts = 10
market_retry_interval_secs = 5
# Velocity windows
velocity_window_10s = 10
velocity_window_5s = 5
velocity_window_15s = 15

[telegram.notifications]
position_opened = true
position_closed = true
kill_switch = true
market_transition = false
critical_feed_error = true
edge_monitor = false
signal_detected = false
health_periodic = false


